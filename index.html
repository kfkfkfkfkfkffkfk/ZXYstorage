<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MY VAULT</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');
  :root {
    --bg:#080b12;--surface:#0e1320;--card:#131926;--border:#1e2a3d;
    --accent:#5c6ef8;--accent2:#a78bfa;--green:#34d399;
    --text:#e8ecf4;--muted:#6b7a99;--danger:#f87171;
    --glow:0 0 24px rgba(92,110,248,0.25);
    --cols:5;
    --card-h:230px;
    --gap:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
  header{position:sticky;top:0;z-index:100;background:rgba(8,11,18,0.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px}
  .logo{font-family:'Space Mono',monospace;font-size:20px;font-weight:700;letter-spacing:-1px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .stats{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);display:flex;gap:16px}
  .stats span b{color:var(--text)}

  #dropzone{margin:20px 24px 0;border:2px dashed var(--border);border-radius:16px;padding:36px 24px;text-align:center;cursor:pointer;transition:all .2s;background:rgba(92,110,248,0.02);position:relative}
  #dropzone.drag-over{border-color:var(--accent);background:rgba(92,110,248,0.07);box-shadow:var(--glow)}
  #dropzone h2{font-size:18px;font-weight:600;margin-bottom:6px}
  #dropzone p{color:var(--muted);font-size:13px}
  #dropzone .hint{color:#3a4460;font-size:11px;margin-top:4px}
  #fileInput{display:none}
  .dz-icon{font-size:36px;margin-bottom:10px;display:block}

  .toolbar{margin:14px 24px 0;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .btn{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;padding:8px 16px;border-radius:9px;border:none;cursor:pointer;transition:all .15s;white-space:nowrap}
  .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
  .btn-primary:hover{opacity:.85;transform:translateY(-1px);box-shadow:var(--glow)}
  .btn-ghost{background:var(--card);color:var(--text);border:1px solid var(--border)}
  .btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
  .btn-danger{background:rgba(248,113,113,0.1);color:var(--danger);border:1px solid rgba(248,113,113,0.2)}
  .btn-danger:hover{background:rgba(248,113,113,0.18)}

  .search-wrap{flex:1;min-width:160px;position:relative}
  .search-wrap input{width:100%;padding:8px 14px 8px 34px;background:var(--card);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:12px;font-family:'Space Grotesk',sans-serif;outline:none;transition:border-color .15s}
  .search-wrap input:focus{border-color:var(--accent)}
  .search-wrap::before{content:'🔍';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none}

  .filter-tabs{display:flex;gap:5px;flex-wrap:wrap}
  .tab{padding:5px 12px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .15s;font-family:'Space Grotesk',sans-serif}
  .tab.active{background:var(--accent);border-color:var(--accent);color:#fff}

  #progressBar{margin:12px 24px 0;display:none;background:var(--card);border-radius:10px;padding:12px 16px;border:1px solid var(--border)}
  #progressBar.show{display:block}
  #progressLabel{font-size:12px;color:var(--muted);margin-bottom:7px}
  #progressTrack{background:var(--border);border-radius:4px;height:5px;overflow:hidden}
  #progressFill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;width:0;transition:width .06s}

  /* ── VIRTUAL SCROLL CONTAINER ── */
  #scrollPort{
    margin:16px 24px 40px;
    overflow-y:auto;
    /* height set by JS */
  }
  #gridSpacer{
    position:relative;
    /* height = total rows * (card-h + gap), set by JS */
  }
  #gridWindow{
    position:absolute;
    left:0;right:0;
    display:grid;
    grid-template-columns:repeat(var(--cols),1fr);
    gap:var(--gap);
  }

  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .12s,transform .12s,box-shadow .12s;display:flex;flex-direction:column;height:var(--card-h)}
  .card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 6px 28px rgba(92,110,248,0.15)}
  .card-media{width:100%;flex:1;background:var(--surface);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;min-height:0}
  .card-media img{width:100%;height:100%;object-fit:cover;display:block}
  .card-media video{width:100%;height:100%;object-fit:cover;display:block}
  .unmute-btn{position:absolute;bottom:5px;right:5px;background:rgba(0,0,0,0.72);border:none;color:#fff;border-radius:5px;padding:2px 7px;font-size:10px;cursor:pointer;backdrop-filter:blur(4px);font-family:'Space Grotesk',sans-serif;font-weight:700;z-index:2}
  .file-icon{font-size:36px}
  .card-info{padding:8px 10px 10px;flex-shrink:0}
  .card-name{font-size:11px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
  .card-meta{font-size:10px;color:var(--muted);margin-bottom:6px}
  .card-actions{display:flex;gap:5px}
  .card-btn{flex:1;padding:5px 0;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:10px;font-weight:600;cursor:pointer;transition:all .12s;font-family:'Space Grotesk',sans-serif}
  .card-btn:hover{border-color:var(--accent);color:var(--accent)}
  .card-btn.del:hover{border-color:var(--danger);color:var(--danger)}

  #empty{text-align:center;padding:70px 24px;color:var(--muted);font-size:15px;display:none}
  #empty.show{display:block}

  #toast{position:fixed;bottom:20px;right:20px;z-index:999;background:var(--green);color:#000;font-weight:700;font-size:12px;padding:10px 18px;border-radius:9px;transform:translateY(70px);opacity:0;transition:all .25s;font-family:'Space Mono',monospace}
  #toast.show{transform:translateY(0);opacity:1}

  ::-webkit-scrollbar{width:5px}
  ::-webkit-scrollbar-track{background:var(--bg)}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

  @media(max-width:900px){:root{--cols:4}}
  @media(max-width:700px){:root{--cols:3}}
  @media(max-width:480px){:root{--cols:2;--card-h:200px}header{padding:0 12px}.toolbar,#scrollPort,#dropzone,#progressBar{margin-left:12px;margin-right:12px}}
</style>
</head>
<body>

<header>
  <div class="logo">⬡ VAULT</div>
  <div class="stats">
    <span>FILES <b id="statCount">0</b></span>
    <span>SHOWN <b id="statShown">0</b></span>
    <span>SIZE <b id="statSize">0 B</b></span>
  </div>
</header>

<div id="dropzone" onclick="document.getElementById('fileInput').click()">
  <span class="dz-icon">📂</span>
  <h2>Drop your files here</h2>
  <p>Images · Videos · Audio · Documents · Anything — 2500+ files no problem</p>
  <div class="hint">Stored only in your browser. No server. Fully private.</div>
  <input type="file" id="fileInput" multiple>
</div>

<div id="progressBar">
  <div id="progressLabel">Processing…</div>
  <div id="progressTrack"><div id="progressFill"></div></div>
</div>

<div class="toolbar">
  <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">＋ Add Files</button>
  <button class="btn btn-ghost" onclick="downloadAll()">⬇ Download All</button>
  <button class="btn btn-danger" onclick="clearAll()">🗑 Clear All</button>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Search files…" oninput="onFilterChange()">
  </div>
  <div class="filter-tabs">
    <button class="tab active" onclick="setFilter('all',this)">All</button>
    <button class="tab" onclick="setFilter('image',this)">🖼 Images</button>
    <button class="tab" onclick="setFilter('video',this)">🎬 Videos</button>
    <button class="tab" onclick="setFilter('audio',this)">🎵 Audio</button>
    <button class="tab" onclick="setFilter('doc',this)">📄 Docs</button>
    <button class="tab" onclick="setFilter('other',this)">📦 Other</button>
  </div>
</div>

<div id="scrollPort">
  <div id="gridSpacer">
    <div id="gridWindow"></div>
  </div>
</div>
<div id="empty">No files yet — drop some above!</div>
<div id="toast"></div>

<script>
// ══════════════════════════════════════════════
//  IndexedDB
// ══════════════════════════════════════════════
const DB_NAME='VaultDB2',DB_VER=1,STORE='files';
let db;
function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(DB_NAME,DB_VER);
    r.onupgradeneeded=e=>e.target.result.createObjectStore(STORE,{keyPath:'id'});
    r.onsuccess=e=>{db=e.target.result;res()};
    r.onerror=rej;
  });
}
function dbPut(rec){return new Promise((res,rej)=>{const tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).put(rec).onsuccess=()=>res();tx.onerror=rej;})}
function dbGetAll(){return new Promise((res,rej)=>{const tx=db.transaction(STORE,'readonly');const r=tx.objectStore(STORE).getAll();r.onsuccess=e=>res(e.target.result);r.onerror=rej;})}
function dbDelete(id){return new Promise((res,rej)=>{const tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).delete(id).onsuccess=()=>res();tx.onerror=rej;})}
function dbClear(){return new Promise((res,rej)=>{const tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).clear().onsuccess=()=>res();tx.onerror=rej;})}

// ══════════════════════════════════════════════
//  State
// ══════════════════════════════════════════════
let allFiles=[];      // all stored records
let filtered=[];      // after filter/search
let objURLs={};       // id -> objectURL
let currentFilter='all';
let visibleStart=0,visibleEnd=0; // currently rendered index range

// Layout constants (read from CSS custom props)
let COLS=5, CARD_H=230, GAP=14;

function readLayout(){
  const s=getComputedStyle(document.documentElement);
  COLS=parseInt(s.getPropertyValue('--cols'))||5;
  CARD_H=parseInt(s.getPropertyValue('--card-h'))||230;
  GAP=parseInt(s.getPropertyValue('--gap'))||14;
}

// ══════════════════════════════════════════════
//  Helpers
// ══════════════════════════════════════════════
function cat(mime){
  if(!mime)return'other';
  if(mime.startsWith('image/'))return'image';
  if(mime.startsWith('video/'))return'video';
  if(mime.startsWith('audio/'))return'audio';
  if(/pdf|word|excel|powerpoint|text\/|document|sheet|presentation|opendoc/.test(mime))return'doc';
  return'other';
}
function icon(c,mime){
  if(c==='image')return'🖼️';
  if(c==='video')return'🎬';
  if(c==='audio')return'🎵';
  if(c==='doc')return mime&&mime.includes('pdf')?'📄':'📝';
  return'📦';
}
function fmtSize(b){
  if(!b)return'0 B';
  if(b<1024)return b+' B';
  if(b<1048576)return(b/1024).toFixed(1)+' KB';
  if(b<1073741824)return(b/1048576).toFixed(1)+' MB';
  return(b/1073741824).toFixed(2)+' GB';
}
function getURL(rec){
  if(!objURLs[rec.id])objURLs[rec.id]=URL.createObjectURL(rec.blob);
  return objURLs[rec.id];
}
function updateStats(){
  document.getElementById('statCount').textContent=allFiles.length.toLocaleString();
  document.getElementById('statShown').textContent=filtered.length.toLocaleString();
  document.getElementById('statSize').textContent=fmtSize(allFiles.reduce((s,f)=>s+(f.size||0),0));
}

// ══════════════════════════════════════════════
//  Virtual Scroll
// ══════════════════════════════════════════════
const PORT=document.getElementById('scrollPort');
const SPACER=document.getElementById('gridSpacer');
const GWIN=document.getElementById('gridWindow');
const EMPTY=document.getElementById('empty');

// How tall one row is
function rowH(){return CARD_H+GAP;}
// Number of rows
function numRows(){return Math.ceil(filtered.length/COLS);}
// Total spacer height
function totalH(){return numRows()*rowH()-GAP;}

// Resize port to fill remaining viewport height
function sizePort(){
  const rect=PORT.getBoundingClientRect();
  PORT.style.height=(window.innerHeight-rect.top-8)+'px';
}

function setSpacerH(){
  SPACER.style.height=(filtered.length?totalH():0)+'px';
}

// Render only cards in the visible slice
const OVERSCAN=2; // extra rows above/below
function renderVisible(){
  if(!filtered.length){
    GWIN.innerHTML='';
    EMPTY.className='show';
    return;
  }
  EMPTY.className='';

  const scrollTop=PORT.scrollTop;
  const viewH=PORT.clientHeight;

  // which rows are visible?
  const rH=rowH();
  let rowStart=Math.max(0,Math.floor(scrollTop/rH)-OVERSCAN);
  let rowEnd=Math.min(numRows()-1,Math.ceil((scrollTop+viewH)/rH)+OVERSCAN);

  const idxStart=rowStart*COLS;
  const idxEnd=Math.min(filtered.length-1,rowEnd*COLS+COLS-1);

  // Skip re-render if same range
  if(idxStart===visibleStart&&idxEnd===visibleEnd)return;
  visibleStart=idxStart; visibleEnd=idxEnd;

  // Position the window
  GWIN.style.top=(rowStart*rH)+'px';
  GWIN.style.gridTemplateColumns=`repeat(${COLS},1fr)`;
  GWIN.style.gap=GAP+'px';

  const frag=document.createDocumentFragment();
  for(let i=idxStart;i<=idxEnd;i++){
    const rec=filtered[i];
    const c=cat(rec.type);
    const url=getURL(rec);
    const card=document.createElement('div');
    card.className='card';
    card.style.height=CARD_H+'px';

    let media='';
    if(c==='image'){
      media=`<div class="card-media"><img src="${url}" alt="" loading="lazy" decoding="async"></div>`;
    }else if(c==='video'){
      const vid='v_'+rec.id.replace(/[^a-z0-9]/gi,'_');
      media=`<div class="card-media"><video src="${url}" autoplay muted loop playsinline id="${vid}"></video><button class="unmute-btn" onclick="toggleMute('${vid}',this)">🔇</button></div>`;
    }else if(c==='audio'){
      media=`<div class="card-media"><span class="file-icon">🎵</span></div>`;
    }else{
      media=`<div class="card-media"><span class="file-icon">${icon(c,rec.type)}</span></div>`;
    }

    // safe id for onclick
    const sid=CSS.escape(rec.id);
    card.innerHTML=`${media}<div class="card-info"><div class="card-name" title="${escHtml(rec.name)}">${escHtml(rec.name)}</div><div class="card-meta">${fmtSize(rec.size)}</div><div class="card-actions"><button class="card-btn" onclick="dlOne(${JSON.stringify(rec.id)})">⬇ Save</button><button class="card-btn del" onclick="delOne(${JSON.stringify(rec.id)})">✕</button></div></div>`;
    frag.appendChild(card);
  }
  GWIN.innerHTML='';
  GWIN.appendChild(frag);
}

function escHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toggleMute(vid,btn){
  const v=document.getElementById(vid);
  if(!v)return;
  v.muted=!v.muted;
  btn.textContent=v.muted?'🔇':'🔊';
}

// Full re-layout after filter change or load
function relayout(){
  readLayout();
  sizePort();
  setSpacerH();
  visibleStart=-1;visibleEnd=-1; // force re-render
  renderVisible();
  updateStats();
}

PORT.addEventListener('scroll',renderVisible,{passive:true});
window.addEventListener('resize',()=>{readLayout();sizePort();setSpacerH();visibleStart=-1;visibleEnd=-1;renderVisible();});

// ══════════════════════════════════════════════
//  Filter / Search
// ══════════════════════════════════════════════
function buildFiltered(){
  const q=document.getElementById('searchInput').value.toLowerCase().trim();
  filtered=allFiles.filter(f=>{
    const c=cat(f.type);
    return(currentFilter==='all'||c===currentFilter)&&(!q||f.name.toLowerCase().includes(q));
  });
}
function setFilter(f,el){
  currentFilter=f;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  onFilterChange();
}
function onFilterChange(){
  buildFiltered();
  PORT.scrollTop=0;
  relayout();
}

// ══════════════════════════════════════════════
//  Ingest files — chunked, non-blocking
// ══════════════════════════════════════════════
async function ingestFiles(fileList){
  const files=Array.from(fileList);
  if(!files.length)return;
  showProg(0,files.length);
  const CHUNK=25;
  for(let i=0;i<files.length;i+=CHUNK){
    const chunk=files.slice(i,i+CHUNK);
    await Promise.all(chunk.map(async f=>{
      const id='f_'+Date.now()+'_'+Math.random().toString(36).slice(2);
      const rec={id,name:f.name,type:f.type||'',size:f.size,blob:f};
      allFiles.push(rec);
      await dbPut(rec);
    }));
    showProg(Math.min(i+CHUNK,files.length),files.length);
    await yld();
  }
  hideProg();
  buildFiltered();
  relayout();
  toast(`✓ Added ${files.length.toLocaleString()} file${files.length>1?'s':''}`);
}

// ══════════════════════════════════════════════
//  Download
// ══════════════════════════════════════════════
function dlOne(id){
  const rec=allFiles.find(f=>f.id===id);
  if(!rec)return;
  const a=document.createElement('a');
  a.href=getURL(rec);a.download=rec.name;a.click();
}

async function downloadAll(){
  if(!filtered.length)return toast('Nothing to download!');
  toast(`⬇ Starting download of ${filtered.length.toLocaleString()} files…`);
  for(let i=0;i<filtered.length;i++){
    const a=document.createElement('a');
    a.href=getURL(filtered[i]);a.download=filtered[i].name;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    // Pause every 5 so browser doesn't block
    if(i%5===4)await new Promise(r=>setTimeout(r,350));
  }
}

// ══════════════════════════════════════════════
//  Delete
// ══════════════════════════════════════════════
async function delOne(id){
  if(objURLs[id]){URL.revokeObjectURL(objURLs[id]);delete objURLs[id];}
  allFiles=allFiles.filter(f=>f.id!==id);
  await dbDelete(id);
  buildFiltered();
  relayout();
}
async function clearAll(){
  if(!confirm('Delete ALL files from vault? This cannot be undone.'))return;
  Object.values(objURLs).forEach(u=>URL.revokeObjectURL(u));
  objURLs={};allFiles=[];filtered=[];
  await dbClear();
  relayout();
  toast('Vault cleared');
}

// ══════════════════════════════════════════════
//  Progress
// ══════════════════════════════════════════════
function showProg(done,total){
  document.getElementById('progressBar').className='show';
  document.getElementById('progressLabel').textContent=`Processing ${done.toLocaleString()} / ${total.toLocaleString()} files…`;
  document.getElementById('progressFill').style.width=(done/total*100)+'%';
}
function hideProg(){document.getElementById('progressBar').className='';}

// ══════════════════════════════════════════════
//  Toast
// ══════════════════════════════════════════════
let tt;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='show';
  clearTimeout(tt);tt=setTimeout(()=>t.className='',3000);
}

// ══════════════════════════════════════════════
//  Drag & Drop
// ══════════════════════════════════════════════
const dz=document.getElementById('dropzone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over')});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag-over');ingestFiles(e.dataTransfer.files)});
document.body.addEventListener('dragover',e=>e.preventDefault());
document.body.addEventListener('drop',e=>{
  e.preventDefault();
  if(e.dataTransfer.files.length&&!dz.contains(e.target))ingestFiles(e.dataTransfer.files);
});
document.getElementById('fileInput').addEventListener('change',e=>{ingestFiles(e.target.files);e.target.value='';});

// ══════════════════════════════════════════════
//  Util
// ══════════════════════════════════════════════
function yld(){return new Promise(r=>setTimeout(r,0));}

// ══════════════════════════════════════════════
//  Init
// ══════════════════════════════════════════════
async function init(){
  await openDB();
  const saved=await dbGetAll();
  if(saved.length){
    showProg(0,saved.length);
    const CHUNK=100;
    for(let i=0;i<saved.length;i+=CHUNK){
      allFiles.push(...saved.slice(i,i+CHUNK));
      showProg(Math.min(i+CHUNK,saved.length),saved.length);
      await yld();
    }
    hideProg();
  }
  buildFiltered();
  relayout();
}
init();
</script>
</body>
</html>
