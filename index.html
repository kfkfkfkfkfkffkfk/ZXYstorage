<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MY VAULT</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');
  :root {
    --bg:#080b12;--surface:#0e1320;--card:#131926;--border:#1e2a3d;
    --accent:#5c6ef8;--accent2:#a78bfa;--green:#34d399;
    --text:#e8ecf4;--muted:#6b7a99;--danger:#f87171;
    --glow:0 0 24px rgba(92,110,248,0.25);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
  header{position:sticky;top:0;z-index:100;background:rgba(8,11,18,0.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:64px}
  .logo{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;letter-spacing:-1px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .stats{font-family:'Space Mono',monospace;font-size:12px;color:var(--muted);display:flex;gap:20px}
  .stats span b{color:var(--text)}
  #dropzone{margin:28px 24px 0;border:2px dashed var(--border);border-radius:20px;padding:48px 32px;text-align:center;cursor:pointer;transition:all .2s;background:linear-gradient(135deg,rgba(92,110,248,0.03),rgba(167,139,250,0.03));position:relative;overflow:hidden}
  #dropzone.drag-over{border-color:var(--accent);background:rgba(92,110,248,0.08);box-shadow:var(--glow)}
  #dropzone::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 0%,rgba(92,110,248,0.06),transparent 70%);pointer-events:none}
  #dropzone h2{font-size:22px;font-weight:600;margin-bottom:8px}
  #dropzone p{color:var(--muted);font-size:14px}
  #fileInput{display:none}
  .upload-icon{font-size:48px;margin-bottom:16px;display:block}
  .toolbar{margin:20px 24px 0;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .btn{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;padding:9px 18px;border-radius:10px;border:none;cursor:pointer;transition:all .15s;letter-spacing:.3px}
  .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
  .btn-primary:hover{opacity:.85;transform:translateY(-1px);box-shadow:var(--glow)}
  .btn-ghost{background:var(--card);color:var(--text);border:1px solid var(--border)}
  .btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
  .btn-danger{background:rgba(248,113,113,0.12);color:var(--danger);border:1px solid rgba(248,113,113,0.2)}
  .btn-danger:hover{background:rgba(248,113,113,0.2)}
  .search-wrap{flex:1;min-width:200px;position:relative}
  .search-wrap input{width:100%;padding:9px 16px 9px 38px;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;font-family:'Space Grotesk',sans-serif;outline:none;transition:border-color .15s}
  .search-wrap input:focus{border-color:var(--accent)}
  .search-wrap::before{content:'🔍';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none}
  .filter-tabs{display:flex;gap:6px;flex-wrap:wrap}
  .tab{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .15s}
  .tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
  #progressBar{margin:16px 24px 0;display:none;background:var(--card);border-radius:12px;padding:14px 18px;border:1px solid var(--border)}
  #progressBar.show{display:block}
  #progressLabel{font-size:13px;color:var(--muted);margin-bottom:8px}
  #progressTrack{background:var(--border);border-radius:6px;height:6px;overflow:hidden}
  #progressFill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:6px;width:0;transition:width .08s}
  #grid{margin:20px 24px 40px;display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:border-color .15s,transform .15s,box-shadow .15s;display:flex;flex-direction:column}
  .card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 32px rgba(92,110,248,0.15)}
  .card-media{width:100%;aspect-ratio:16/10;background:var(--surface);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
  .card-media img{width:100%;height:100%;object-fit:cover;display:block}
  .card-media video{width:100%;height:100%;object-fit:cover;display:block}
  .unmute-btn{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,0.7);border:none;color:#fff;border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer;backdrop-filter:blur(4px);font-family:'Space Grotesk',sans-serif;font-weight:600}
  .file-icon{font-size:40px}
  .card-info{padding:10px 12px 12px;display:flex;flex-direction:column;gap:4px;flex:1}
  .card-name{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
  .card-meta{font-size:11px;color:var(--muted)}
  .card-actions{display:flex;gap:6px;margin-top:6px}
  .card-btn{flex:1;padding:6px 0;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;font-family:'Space Grotesk',sans-serif}
  .card-btn:hover{border-color:var(--accent);color:var(--accent)}
  .card-btn.del:hover{border-color:var(--danger);color:var(--danger)}
  #empty{text-align:center;padding:80px 24px;color:var(--muted);font-size:16px;display:none}
  #empty.show{display:block}
  #toast{position:fixed;bottom:24px;right:24px;z-index:999;background:var(--green);color:#000;font-weight:700;font-size:13px;padding:12px 20px;border-radius:10px;transform:translateY(80px);opacity:0;transition:all .3s;font-family:'Space Mono',monospace}
  #toast.show{transform:translateY(0);opacity:1}
  ::-webkit-scrollbar{width:6px}
  ::-webkit-scrollbar-track{background:var(--bg)}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
  @media(max-width:600px){#grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}header{padding:0 14px}.toolbar,#grid,#dropzone,#progressBar{margin-left:14px;margin-right:14px}}
</style>
</head>
<body>

<header>
  <div class="logo">⬡ VAULT</div>
  <div class="stats">
    <span>FILES <b id="statCount">0</b></span>
    <span>SIZE <b id="statSize">0 B</b></span>
  </div>
</header>

<div id="dropzone" onclick="document.getElementById('fileInput').click()">
  <span class="upload-icon">📂</span>
  <h2>Drop anything here</h2>
  <p>Images · Videos · Audio · Documents · Any file type · 2500+ files supported<br>
  <small style="color:#4a5568;margin-top:6px;display:block">Stored in your browser — private, no uploads to any server</small></p>
  <input type="file" id="fileInput" multiple>
</div>

<div id="progressBar">
  <div id="progressLabel">Loading files…</div>
  <div id="progressTrack"><div id="progressFill"></div></div>
</div>

<div class="toolbar">
  <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">＋ Add Files</button>
  <button class="btn btn-ghost" onclick="downloadAll()">⬇ Download All</button>
  <button class="btn btn-danger" onclick="clearAll()">🗑 Clear All</button>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Search files…" oninput="renderGrid()">
  </div>
  <div class="filter-tabs">
    <button class="tab active" onclick="setFilter('all',this)">All</button>
    <button class="tab" onclick="setFilter('image',this)">Images</button>
    <button class="tab" onclick="setFilter('video',this)">Videos</button>
    <button class="tab" onclick="setFilter('audio',this)">Audio</button>
    <button class="tab" onclick="setFilter('doc',this)">Docs</button>
    <button class="tab" onclick="setFilter('other',this)">Other</button>
  </div>
</div>

<div id="grid"></div>
<div id="empty">No files yet — drop some above!</div>
<div id="toast"></div>

<script>
// ── IndexedDB ──────────────────────────────────────
const DB_NAME='VaultDB',DB_VER=1,STORE='files';
let db;

function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(DB_NAME,DB_VER);
    r.onupgradeneeded=e=>e.target.result.createObjectStore(STORE,{keyPath:'id'});
    r.onsuccess=e=>{db=e.target.result;res(db)};
    r.onerror=rej;
  });
}
function dbPut(rec){
  return new Promise((res,rej)=>{
    const tx=db.transaction(STORE,'readwrite');
    tx.objectStore(STORE).put(rec).onsuccess=()=>res();
    tx.onerror=rej;
  });
}
function dbGetAll(){
  return new Promise((res,rej)=>{
    const tx=db.transaction(STORE,'readonly');
    const req=tx.objectStore(STORE).getAll();
    req.onsuccess=e=>res(e.target.result);
    req.onerror=rej;
  });
}
function dbDelete(id){
  return new Promise((res,rej)=>{
    const tx=db.transaction(STORE,'readwrite');
    tx.objectStore(STORE).delete(id).onsuccess=()=>res();
    tx.onerror=rej;
  });
}
function dbClear(){
  return new Promise((res,rej)=>{
    const tx=db.transaction(STORE,'readwrite');
    tx.objectStore(STORE).clear().onsuccess=()=>res();
    tx.onerror=rej;
  });
}

// ── State ─────────────────────────────────────────
let allFiles=[];
let currentFilter='all';
let objURLs={};

function cat(mime){
  if(!mime)return'other';
  if(mime.startsWith('image/'))return'image';
  if(mime.startsWith('video/'))return'video';
  if(mime.startsWith('audio/'))return'audio';
  if(/pdf|word|excel|powerpoint|text\/|document|sheet|presentation/.test(mime))return'doc';
  return'other';
}
function icon(c,mime){
  if(c==='image')return'🖼️';
  if(c==='video')return'🎬';
  if(c==='audio')return'🎵';
  if(c==='doc')return mime&&mime.includes('pdf')?'📄':'📝';
  return'📦';
}
function fmtSize(b){
  if(b<1024)return b+' B';
  if(b<1048576)return(b/1024).toFixed(1)+' KB';
  if(b<1073741824)return(b/1048576).toFixed(1)+' MB';
  return(b/1073741824).toFixed(2)+' GB';
}
function getURL(rec){
  if(!objURLs[rec.id])objURLs[rec.id]=URL.createObjectURL(rec.blob);
  return objURLs[rec.id];
}

// ── Stats ─────────────────────────────────────────
function updateStats(){
  document.getElementById('statCount').textContent=allFiles.length.toLocaleString();
  document.getElementById('statSize').textContent=fmtSize(allFiles.reduce((s,f)=>s+(f.size||0),0));
}

// ── Render ────────────────────────────────────────
function getFiltered(){
  const q=document.getElementById('searchInput').value.toLowerCase().trim();
  return allFiles.filter(f=>{
    const c=cat(f.type);
    return(currentFilter==='all'||c===currentFilter)&&(!q||f.name.toLowerCase().includes(q));
  });
}

function renderGrid(){
  const grid=document.getElementById('grid');
  const empty=document.getElementById('empty');
  const filtered=getFiltered();
  if(!filtered.length){
    grid.innerHTML='';
    empty.className='show';
    empty.textContent=allFiles.length?'No files match your filter.':'No files yet — drop some above!';
    return;
  }
  empty.className='';
  const frag=document.createDocumentFragment();
  for(const rec of filtered){
    const c=cat(rec.type);
    const url=getURL(rec);
    const card=document.createElement('div');
    card.className='card';
    let media='';
    if(c==='image'){
      media=`<div class="card-media"><img src="${url}" alt="" loading="lazy"></div>`;
    }else if(c==='video'){
      media=`<div class="card-media"><video src="${url}" autoplay muted loop playsinline id="v_${rec.id}"></video><button class="unmute-btn" onclick="toggleMute('v_${rec.id}',this)">🔇 MUTED</button></div>`;
    }else{
      media=`<div class="card-media"><span class="file-icon">${icon(c,rec.type)}</span></div>`;
    }
    card.innerHTML=`${media}<div class="card-info"><div class="card-name" title="${rec.name}">${rec.name}</div><div class="card-meta">${fmtSize(rec.size)}</div><div class="card-actions"><button class="card-btn" onclick="dlOne('${rec.id}')">⬇ Save</button><button class="card-btn del" onclick="delOne('${rec.id}')">✕ Del</button></div></div>`;
    frag.appendChild(card);
  }
  grid.innerHTML='';
  grid.appendChild(frag);
}

function toggleMute(vid,btn){
  const v=document.getElementById(vid);
  if(!v)return;
  v.muted=!v.muted;
  btn.textContent=v.muted?'🔇 MUTED':'🔊 ON';
}

// ── Ingest ────────────────────────────────────────
async function ingestFiles(fileList){
  const files=Array.from(fileList);
  if(!files.length)return;
  showProg(0,files.length);
  const CHUNK=20;
  for(let i=0;i<files.length;i+=CHUNK){
    const chunk=files.slice(i,i+CHUNK);
    await Promise.all(chunk.map(async f=>{
      const id=Date.now()+'_'+Math.random().toString(36).slice(2)+'_'+f.name;
      const rec={id,name:f.name,type:f.type||'',size:f.size,blob:f};
      allFiles.push(rec);
      await dbPut(rec);
    }));
    showProg(Math.min(i+CHUNK,files.length),files.length);
    await new Promise(r=>setTimeout(r,0));
  }
  hideProg();
  renderGrid();
  updateStats();
  toast(`✓ Added ${files.length} file${files.length>1?'s':''}`);
}

// ── Download ──────────────────────────────────────
function dlOne(id){
  const rec=allFiles.find(f=>f.id===id);
  if(!rec)return;
  const a=document.createElement('a');
  a.href=getURL(rec);a.download=rec.name;a.click();
}

async function downloadAll(){
  const filtered=getFiltered();
  if(!filtered.length)return toast('Nothing to download!');
  for(let i=0;i<filtered.length;i++){
    const a=document.createElement('a');
    a.href=getURL(filtered[i]);a.download=filtered[i].name;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    if(i%5===4)await new Promise(r=>setTimeout(r,400));
  }
  toast(`⬇ Downloading ${filtered.length} files`);
}

// ── Delete ────────────────────────────────────────
async function delOne(id){
  if(objURLs[id]){URL.revokeObjectURL(objURLs[id]);delete objURLs[id];}
  allFiles=allFiles.filter(f=>f.id!==id);
  await dbDelete(id);
  renderGrid();updateStats();
}
async function clearAll(){
  if(!confirm('Delete ALL files from vault? This cannot be undone.'))return;
  Object.values(objURLs).forEach(u=>URL.revokeObjectURL(u));
  objURLs={};allFiles=[];
  await dbClear();
  renderGrid();updateStats();
  toast('Vault cleared');
}

// ── Filter ────────────────────────────────────────
function setFilter(f,el){
  currentFilter=f;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderGrid();
}

// ── Progress ──────────────────────────────────────
function showProg(done,total){
  document.getElementById('progressBar').className='show';
  document.getElementById('progressLabel').textContent=`Processing ${done.toLocaleString()} / ${total.toLocaleString()} files…`;
  document.getElementById('progressFill').style.width=(done/total*100)+'%';
}
function hideProg(){document.getElementById('progressBar').className='';}

// ── Toast ─────────────────────────────────────────
let tt;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='show';
  clearTimeout(tt);tt=setTimeout(()=>t.className='',2800);
}

// ── Drag & Drop ───────────────────────────────────
const dz=document.getElementById('dropzone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over')});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag-over');ingestFiles(e.dataTransfer.files)});
document.body.addEventListener('dragover',e=>e.preventDefault());
document.body.addEventListener('drop',e=>{e.preventDefault();if(e.dataTransfer.files.length&&e.target!==dz)ingestFiles(e.dataTransfer.files)});
document.getElementById('fileInput').addEventListener('change',e=>{ingestFiles(e.target.files);e.target.value='';});

// ── Init ──────────────────────────────────────────
async function init(){
  await openDB();
  const saved=await dbGetAll();
  if(saved.length){
    showProg(0,saved.length);
    const CHUNK=50;
    for(let i=0;i<saved.length;i+=CHUNK){
      allFiles.push(...saved.slice(i,i+CHUNK));
      showProg(Math.min(i+CHUNK,saved.length),saved.length);
      await new Promise(r=>setTimeout(r,0));
    }
    hideProg();
  }
  renderGrid();updateStats();
}
init();
</script>
</body>
</html>
