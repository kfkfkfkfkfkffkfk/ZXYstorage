<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MY GITHUB VAULT</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');
  :root {
    --bg:#080b12;--surface:#0e1320;--card:#131926;--border:#1e2a3d;
    --accent:#5c6ef8;--accent2:#a78bfa;--green:#34d399;
    --text:#e8ecf4;--muted:#6b7a99;--danger:#f87171;
    --glow:0 0 24px rgba(92,110,248,0.25);
    --cols:5;
    --card-h:230px;
    --gap:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
  header{position:sticky;top:0;z-index:100;background:rgba(8,11,18,0.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px}
  .logo{font-family:'Space Mono',monospace;font-size:20px;font-weight:700;letter-spacing:-1px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .stats{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);display:flex;gap:16px}
  .stats span b{color:var(--text)}

  #fileInput{display:none}

  .toolbar{margin:24px 24px 0;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .btn{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;padding:8px 16px;border-radius:9px;border:none;cursor:pointer;transition:all .15s;white-space:nowrap}
  .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
  .btn-primary:hover{opacity:.85;transform:translateY(-1px);box-shadow:var(--glow)}
  .btn-ghost{background:var(--card);color:var(--text);border:1px solid var(--border)}
  .btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
  .btn-danger{background:rgba(248,113,113,0.1);color:var(--danger);border:1px solid rgba(248,113,113,0.2)}
  .btn-danger:hover{background:rgba(248,113,113,0.18)}
  .btn-copy{background:linear-gradient(135deg, var(--green), #059669); color:#000;}
  .btn-copy:hover{opacity:.85;transform:translateY(-1px);box-shadow:0 0 24px rgba(52,211,153,0.25)}

  .search-wrap{flex:1;min-width:160px;position:relative;display:flex;align-items:center;}
  .search-wrap input{width:100%;padding:8px 30px 8px 34px;background:var(--card);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:12px;font-family:'Space Grotesk',sans-serif;outline:none;transition:border-color .15s}
  .search-wrap input:focus{border-color:var(--accent)}
  .search-wrap::before{content:'🔍';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none}
  #clearSearchBtn{position:absolute;right:8px;background:transparent;border:none;color:var(--muted);font-size:12px;cursor:pointer;display:none;padding:4px;border-radius:50%;transition:0.2s;}
  #clearSearchBtn:hover{color:var(--text);background:var(--border);}

  .filter-tabs{display:flex;gap:5px;flex-wrap:wrap}
  .tab{padding:5px 12px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .15s;font-family:'Space Grotesk',sans-serif}
  .tab.active{background:var(--accent);border-color:var(--accent);color:#fff}

  #progressBar{margin:12px 24px 0;display:none;background:var(--card);border-radius:10px;padding:12px 16px;border:1px solid var(--border)}
  #progressBar.show{display:block}
  #progressLabel{font-size:12px;color:var(--muted);margin-bottom:7px}
  #progressTrack{background:var(--border);border-radius:4px;height:5px;overflow:hidden}
  #progressFill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;width:0;transition:width .06s}

  #scrollPort{
    margin:16px 24px 40px;
    overflow-y:auto;
    outline: none;
  }
  #gridSpacer{
    position:relative;
  }
  #gridWindow{
    position:absolute;
    left:0;right:0;
    display:grid;
    grid-template-columns:repeat(var(--cols),1fr);
    gap:var(--gap);
  }

  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .12s,transform .12s,box-shadow .12s;display:flex;flex-direction:column;height:var(--card-h);cursor:pointer;}
  .card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 6px 28px rgba(92,110,248,0.15)}
  .card.selected{border-color:var(--accent);box-shadow:var(--glow);transform:translateY(-2px);}
  
  .card-media{width:100%;flex:1;background:var(--surface);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;min-height:0}
  .card-media img{width:100%;height:100%;object-fit:cover;display:block}
  .card-media video{width:100%;height:100%;object-fit:cover;display:block}
  .unmute-btn{position:absolute;bottom:5px;right:5px;background:rgba(0,0,0,0.72);border:none;color:#fff;border-radius:5px;padding:2px 7px;font-size:10px;cursor:pointer;backdrop-filter:blur(4px);font-family:'Space Grotesk',sans-serif;font-weight:700;z-index:2}
  .file-icon{font-size:36px}
  .card-info{padding:8px 10px 10px;flex-shrink:0}
  .card-name{font-size:11px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
  .card-meta{font-size:10px;color:var(--muted);margin-bottom:6px}
  .card-actions{display:flex;gap:5px}
  .card-btn{flex:1;padding:5px 0;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:10px;font-weight:600;cursor:pointer;transition:all .12s;font-family:'Space Grotesk',sans-serif}
  .card-btn:hover{border-color:var(--accent);color:var(--accent)}
  .card-btn.del:hover{border-color:var(--danger);color:var(--danger)}

  #empty{text-align:center;padding:70px 24px;color:var(--muted);font-size:15px;display:none}
  #empty.show{display:block}

  #toast{position:fixed;bottom:20px;right:20px;z-index:999;background:var(--green);color:#000;font-weight:700;font-size:12px;padding:10px 18px;border-radius:9px;transform:translateY(70px);opacity:0;transition:all .25s;font-family:'Space Mono',monospace}
  #toast.show{transform:translateY(0);opacity:1}

  /* Preview Overlay Styles */
  #previewOverlay{position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(8,11,18,0.9);backdrop-filter:blur(10px);z-index:2000;display:none;align-items:center;justify-content:center}
  #previewOverlay.show{display:flex}
  #previewContent{max-width:90vw;max-height:90vh;display:flex;align-items:center;justify-content:center;flex-direction:column}
  #previewContent img, #previewContent video{max-width:100%;max-height:90vh;border-radius:8px;object-fit:contain;box-shadow:0 10px 40px rgba(0,0,0,0.5)}
  #previewContent .file-icon{font-size:120px;margin-bottom:15px}
  #previewContent .preview-name{font-size:18px;font-weight:700}
  #previewClose{position:absolute;top:20px;right:20px;background:rgba(255,255,255,0.1);border:none;color:#fff;width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:16px;transition:0.2s}
  #previewClose:hover{background:rgba(255,255,255,0.2)}

  /* Code Preview Styles */
  .code-preview-container{width:90vw;max-width:900px;max-height:85vh;display:flex;flex-direction:column;background:var(--bg);border-radius:12px;overflow:hidden;border:1px solid var(--border);text-align:left;box-shadow:0 10px 40px rgba(0,0,0,0.5);}
  .code-header{padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
  .code-header .preview-name{font-family:'Space Mono',monospace;font-size:14px;color:var(--text);font-weight:700;}
  .code-content{padding:16px;overflow-y:auto;flex:1;font-family:'Space Mono',monospace;font-size:13px;line-height:1.5;color:var(--text);margin:0;white-space:pre-wrap;word-break:break-word;}

  ::-webkit-scrollbar{width:5px}
  ::-webkit-scrollbar-track{background:var(--bg)}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

  @media(max-width:900px){:root{--cols:4}}
  @media(max-width:700px){:root{--cols:3}}
  @media(max-width:480px){:root{--cols:2;--card-h:200px}header{padding:0 12px}.toolbar,#scrollPort,#progressBar{margin-left:12px;margin-right:12px}}
</style>
</head>
<body>

<header>
  <div class="logo">⬡ VAULT</div>
  <div class="stats">
    <span>FILES <b id="statCount">0</b></span>
    <span>SHOWN <b id="statShown">0</b></span>
    <span>SIZE <b id="statSize">0 B</b></span>
  </div>
</header>

<input type="file" id="fileInput" multiple>

<div id="progressBar">
  <div id="progressLabel">Processing…</div>
  <div id="progressTrack"><div id="progressFill"></div></div>
</div>

<div class="toolbar">
  <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">＋ Add Files</button>
  <button class="btn btn-copy" onclick="copyUpdatedCode()">📋 Copy HTML Code</button>
  <button class="btn btn-ghost" onclick="downloadAll()">⬇ Download All</button>
  <button class="btn btn-danger" onclick="clearAll()">🗑 Clear All</button>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Search files…" oninput="onFilterChange()">
    <button id="clearSearchBtn" onclick="clearSearchText()">✕</button>
  </div>
  <div class="filter-tabs">
    <button class="tab active" onclick="setFilter('all',this)">All</button>
    <button class="tab" onclick="setFilter('image',this)">🖼 Images</button>
    <button class="tab" onclick="setFilter('video',this)">🎬 Videos</button>
    <button class="tab" onclick="setFilter('audio',this)">🎵 Audio</button>
    <button class="tab" onclick="setFilter('doc',this)">📄 Docs</button>
    <button class="tab" onclick="setFilter('other',this)">📦 Other</button>
  </div>
</div>

<div id="scrollPort" tabindex="0">
  <div id="gridSpacer">
    <div id="gridWindow"></div>
  </div>
</div>

<div id="empty">No files yet — drop some anywhere!</div>
<div id="toast"></div>

<div id="previewOverlay" onclick="closePreview()">
  <div id="previewContent" onclick="event.stopPropagation()"></div>
  <button id="previewClose" onclick="closePreview()">✕</button>
</div>

<script>
// ══════════════════════════════════════════════
//  GITHUB PRELOAD FILES
// ══════════════════════════════════════════════
const GITHUB_FILES = [
  "example-image.jpg",
  "example-video.mp4",
  "example-document.pdf"
];

// ══════════════════════════════════════════════
//  IndexedDB
// ══════════════════════════════════════════════
const DB_NAME='VaultDB2',DB_VER=1,STORE='files';
let db;
function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open(DB_NAME,DB_VER);
    r.onupgradeneeded=e=>e.target.result.createObjectStore(STORE,{keyPath:'id'});
    r.onsuccess=e=>{db=e.target.result;res()};
    r.onerror=rej;
  });
}
function dbPut(rec){return new Promise((res,rej)=>{const tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).put(rec).onsuccess=()=>res();tx.onerror=rej;})}
function dbGetAll(){return new Promise((res,rej)=>{const tx=db.transaction(STORE,'readonly');const r=tx.objectStore(STORE).getAll();r.onsuccess=e=>res(e.target.result);r.onerror=rej;})}
function dbDelete(id){return new Promise((res,rej)=>{const tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).delete(id).onsuccess=()=>res();tx.onerror=rej;})}
function dbClear(){return new Promise((res,rej)=>{const tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).clear().onsuccess=()=>res();tx.onerror=rej;})}

// ══════════════════════════════════════════════
//  State
// ══════════════════════════════════════════════
let allFiles=[];      
let filtered=[];      
let objURLs={};       
let currentFilter='all';
let visibleStart=0,visibleEnd=0;
let selectedId = null; 

let COLS=5, CARD_H=230, GAP=14;

function readLayout(){
  const s=getComputedStyle(document.documentElement);
  COLS=parseInt(s.getPropertyValue('--cols'))||5;
  CARD_H=parseInt(s.getPropertyValue('--card-h'))||230;
  GAP=parseInt(s.getPropertyValue('--gap'))||14;
}

// ══════════════════════════════════════════════
//  Helpers
// ══════════════════════════════════════════════
function isTextFile(rec) {
  if (rec.type && rec.type.startsWith('text/')) return true;
  if (rec.type === 'application/json') return true;
  const exts = ['.js','.html','.css','.py','.cpp','.c','.java','.ts','.jsx','.tsx','.txt','.md','.json','.xml'];
  return exts.some(ext => rec.name.toLowerCase().endsWith(ext));
}
function cat(mime){
  if(!mime)return'other';
  if(mime.startsWith('image/'))return'image';
  if(mime.startsWith('video/'))return'video';
  if(mime.startsWith('audio/'))return'audio';
  if(/pdf|word|excel|powerpoint|text\/|document|sheet|presentation|opendoc/.test(mime))return'doc';
  return'other';
}
function icon(c,mime){
  if(c==='image')return'🖼️';
  if(c==='video')return'🎬';
  if(c==='audio')return'🎵';
  if(c==='doc')return mime&&mime.includes('pdf')?'📄':'📝';
  return'📦';
}
function fmtSize(b){
  if(!b)return'0 B';
  if(b<1024)return b+' B';
  if(b<1048576)return(b/1024).toFixed(1)+' KB';
  if(b<1073741824)return(b/1048576).toFixed(1)+' MB';
  return(b/1073741824).toFixed(2)+' GB';
}
function getURL(rec){
  if(!objURLs[rec.id])objURLs[rec.id]=URL.createObjectURL(rec.blob);
  return objURLs[rec.id];
}
function updateStats(){
  document.getElementById('statCount').textContent=allFiles.length.toLocaleString();
  document.getElementById('statShown').textContent=filtered.length.toLocaleString();
  document.getElementById('statSize').textContent=fmtSize(allFiles.reduce((s,f)=>s+(f.size||0),0));
}

// ══════════════════════════════════════════════
//  Virtual Scroll
// ══════════════════════════════════════════════
const PORT=document.getElementById('scrollPort');
const SPACER=document.getElementById('gridSpacer');
const GWIN=document.getElementById('gridWindow');
const EMPTY=document.getElementById('empty');

function rowH(){return CARD_H+GAP;}
function numRows(){return Math.ceil(filtered.length/COLS);}
function totalH(){return numRows()*rowH()-GAP;}

function sizePort(){
  const rect=PORT.getBoundingClientRect();
  PORT.style.height=(window.innerHeight-rect.top-8)+'px';
}

function setSpacerH(){
  SPACER.style.height=(filtered.length?totalH():0)+'px';
}

const OVERSCAN=2;
function renderVisible(){
  if(!filtered.length){
    GWIN.innerHTML='';
    EMPTY.className='show';
    return;
  }
  EMPTY.className='';

  const scrollTop=PORT.scrollTop;
  const viewH=PORT.clientHeight;

  const rH=rowH();
  let rowStart=Math.max(0,Math.floor(scrollTop/rH)-OVERSCAN);
  let rowEnd=Math.min(numRows()-1,Math.ceil((scrollTop+viewH)/rH)+OVERSCAN);

  const idxStart=rowStart*COLS;
  const idxEnd=Math.min(filtered.length-1,rowEnd*COLS+COLS-1);

  if(idxStart===visibleStart&&idxEnd===visibleEnd)return;
  visibleStart=idxStart; visibleEnd=idxEnd;

  GWIN.style.top=(rowStart*rH)+'px';
  GWIN.style.gridTemplateColumns=`repeat(${COLS},1fr)`;
  GWIN.style.gap=GAP+'px';

  const frag=document.createDocumentFragment();
  for(let i=idxStart;i<=idxEnd;i++){
    const rec=filtered[i];
    const c=cat(rec.type);
    const url=getURL(rec);
    const card=document.createElement('div');
    
    const isSelected = (selectedId === rec.id) ? ' selected' : '';
    card.className = 'card' + isSelected;
    card.style.height = CARD_H+'px';

    let media='';
    if(c==='image'){
      media=`<div class="card-media"><img src="${url}" alt="" loading="lazy" decoding="async"></div>`;
    }else if(c==='video'){
      const vid='v_'+rec.id.replace(/[^a-z0-9]/gi,'_');
      media=`<div class="card-media"><video src="${url}" autoplay muted loop playsinline id="${vid}"></video><button class="unmute-btn" onclick="toggleMute(event, '${vid}', this)">🔇</button></div>`;
    }else if(c==='audio'){
      media=`<div class="card-media"><span class="file-icon">🎵</span></div>`;
    }else{
      media=`<div class="card-media"><span class="file-icon">${icon(c,rec.type)}</span></div>`;
    }

    // Using single quotes inside the function calls to prevent breaking HTML attributes
    card.setAttribute('onclick', `selectCard(event, '${rec.id}')`);
    card.setAttribute('ondblclick', `openCard('${rec.id}')`);

    card.innerHTML=`${media}
      <div class="card-info">
        <div class="card-name" title="${escHtml(rec.name)}">${escHtml(rec.name)}</div>
        <div class="card-meta">${fmtSize(rec.size)}</div>
        <div class="card-actions">
          <button class="card-btn" onclick="dlOne(event, '${rec.id}')">⬇ Save</button>
          <button class="card-btn del" onclick="delOne(event, '${rec.id}')">✕</button>
        </div>
      </div>`;
    frag.appendChild(card);
  }
  GWIN.innerHTML='';
  GWIN.appendChild(frag);
}

function escHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toggleMute(e, vid, btn){
  e.stopPropagation(); 
  const v=document.getElementById(vid);
  if(!v)return;
  v.muted=!v.muted;
  btn.textContent=v.muted?'🔇':'🔊';
}

function relayout(){
  readLayout();
  sizePort();
  setSpacerH();
  visibleStart=-1;visibleEnd=-1; 
  renderVisible();
  updateStats();
}

PORT.addEventListener('scroll',renderVisible,{passive:true});
window.addEventListener('resize',()=>{readLayout();sizePort();setSpacerH();visibleStart=-1;visibleEnd=-1;renderVisible();});

// ══════════════════════════════════════════════
//  Selection, Arrow Keys & Quick Look
// ══════════════════════════════════════════════
function selectCard(e, id) {
  selectedId = id;
  PORT.focus(); 
  visibleStart=-1;visibleEnd=-1; 
  renderVisible();
}

function openCard(id) {
  const rec = allFiles.find(f => f.id === id);
  if(rec) window.open(getURL(rec), '_blank');
}

function scrollToSelection(index) {
  if (index < 0 || index >= filtered.length) return;
  const rowIndex = Math.floor(index / COLS);
  const cardTop = rowIndex * rowH();
  const cardBottom = cardTop + CARD_H;
  
  if (cardTop < PORT.scrollTop) {
    PORT.scrollTop = cardTop; // Scroll up
  } else if (cardBottom > PORT.scrollTop + PORT.clientHeight) {
    PORT.scrollTop = cardBottom - PORT.clientHeight; // Scroll down
  }
}

let previewOpen = false;
let currentPreviewText = ''; // Stores the raw text safely for copying

async function openPreview() {
  if(!selectedId) return;
  const rec = allFiles.find(f => f.id === selectedId);
  if(!rec) return;

  const url = getURL(rec);
  const c = cat(rec.type);
  const pc = document.getElementById('previewContent');

  if(isTextFile(rec)) {
    try {
      currentPreviewText = await rec.blob.text();
      pc.innerHTML = `
        <div class="code-preview-container" onclick="event.stopPropagation()">
          <div class="code-header">
            <span class="preview-name">${escHtml(rec.name)}</span>
            <button class="btn btn-copy" onclick="copyPreviewCode()">📋 Copy Code</button>
          </div>
          <pre class="code-content">${escHtml(currentPreviewText)}</pre>
        </div>`;
    } catch(err) {
      pc.innerHTML = `<div style="text-align:center;color:white;">Failed to read text file.</div>`;
    }
  }
  else if(c === 'image') pc.innerHTML = `<img src="${url}">`;
  else if(c === 'video') pc.innerHTML = `<video src="${url}" controls autoplay></video>`;
  else pc.innerHTML = `<div style="text-align:center"><div class="file-icon">${icon(c, rec.type)}</div><div class="preview-name">${escHtml(rec.name)}</div></div>`;

  document.getElementById('previewOverlay').classList.add('show');
  previewOpen = true;
}

function closePreview() {
  document.getElementById('previewOverlay').classList.remove('show');
  document.getElementById('previewContent').innerHTML = ''; 
  currentPreviewText = '';
  previewOpen = false;
}

async function copyPreviewCode() {
  try {
    await navigator.clipboard.writeText(currentPreviewText);
    toast('✓ Code copied to clipboard!');
  } catch(e) {
    toast('❌ Failed to copy code.');
  }
}

document.addEventListener('keydown', e => {
  if(e.target.tagName === 'INPUT') return; 

  if (e.code === 'Space') {
    e.preventDefault(); 
    if (previewOpen) closePreview();
    else if (selectedId) openPreview();
  } else if (e.code === 'Escape' && previewOpen) {
    closePreview();
  } else if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) {
    if (!filtered.length || previewOpen) return;
    e.preventDefault(); 

    let currentIndex = filtered.findIndex(f => f.id === selectedId);
    
    if (currentIndex === -1) {
      currentIndex = 0;
    } else {
      if (e.code === 'ArrowRight') currentIndex++;
      else if (e.code === 'ArrowLeft') currentIndex--;
      else if (e.code === 'ArrowDown') currentIndex += COLS;
      else if (e.code === 'ArrowUp') currentIndex -= COLS;
    }

    if (currentIndex < 0) currentIndex = 0;
    if (currentIndex >= filtered.length) currentIndex = filtered.length - 1;

    selectedId = filtered[currentIndex].id;
    scrollToSelection(currentIndex);
    
    visibleStart = -1; visibleEnd = -1; 
    renderVisible();
  }
});

// ══════════════════════════════════════════════
//  Filter / Search
// ══════════════════════════════════════════════
function buildFiltered(){
  const q=document.getElementById('searchInput').value.toLowerCase().trim();
  filtered=allFiles.filter(f=>{
    const c=cat(f.type);
    return(currentFilter==='all'||c===currentFilter)&&(!q||f.name.toLowerCase().includes(q));
  });
}

function setFilter(f,el){
  currentFilter=f;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  
  const searchBox = document.getElementById('searchInput');
  if (f === 'image') searchBox.placeholder = 'Search photos...';
  else if (f === 'video') searchBox.placeholder = 'Search videos...';
  else searchBox.placeholder = 'Search files...';
  
  onFilterChange();
}

function onFilterChange(){
  const searchBox = document.getElementById('searchInput');
  const clearBtn = document.getElementById('clearSearchBtn');
  
  if(searchBox.value.length > 0) clearBtn.style.display = 'block';
  else clearBtn.style.display = 'none';

  buildFiltered();
  PORT.scrollTop=0;
  relayout();
}

function clearSearchText() {
  const searchBox = document.getElementById('searchInput');
  searchBox.value = '';
  searchBox.focus(); 
  onFilterChange();
}

// ══════════════════════════════════════════════
//  Ingest files
// ══════════════════════════════════════════════
async function ingestFiles(fileList){
  const files=Array.from(fileList);
  if(!files.length)return;
  showProg(0,files.length);
  const CHUNK=25;
  for(let i=0;i<files.length;i+=CHUNK){
    const chunk=files.slice(i,i+CHUNK);
    await Promise.all(chunk.map(async f=>{
      const id='f_'+Date.now()+'_'+Math.random().toString(36).slice(2);
      const rec={id,name:f.name,type:f.type||'',size:f.size,blob:f};
      allFiles.push(rec);
      await dbPut(rec);
    }));
    showProg(Math.min(i+CHUNK,files.length),files.length);
    await yld();
  }
  hideProg();
  buildFiltered();
  relayout();
  toast(`✓ Added ${files.length.toLocaleString()} file${files.length>1?'s':''}`);
}

// ══════════════════════════════════════════════
//  Copy HTML Code Feature
// ══════════════════════════════════════════════
async function copyUpdatedCode() {
  if (allFiles.length === 0) return toast('No files added yet! Add some files first.');

  const fileNames = allFiles.map(f => `  "${f.name}"`);
  const newArrayStr = `const GITHUB_FILES = [\n${fileNames.join(',\n')}\n];`;

  const clone = document.documentElement.cloneNode(true);

  clone.querySelector('#statCount').textContent = '0';
  clone.querySelector('#statShown').textContent = '0';
  clone.querySelector('#statSize').textContent = '0 B';
  clone.querySelector('#gridWindow').innerHTML = ''; 
  clone.querySelector('#empty').className = '';
  clone.querySelector('#progressBar').className = '';
  clone.querySelector('#searchInput').value = '';
  clone.querySelector('#clearSearchBtn').style.display = 'none';
  clone.querySelector('#previewOverlay').classList.remove('show');
  clone.querySelector('#previewContent').innerHTML = '';
  clone.querySelectorAll('.tab').forEach((t, i) => {
    if (i === 0) t.classList.add('active');
    else t.classList.remove('active');
  });

  let htmlString = '<!DOCTYPE html>\n<html lang="en">\n' + clone.innerHTML + '\n</html>';
  htmlString = htmlString.replace(/const GITHUB_FILES = \[[\s\S]*?\];/, newArrayStr);

  try {
    await navigator.clipboard.writeText(htmlString);
    toast('✓ App Code copied! Paste into GitHub');
  } catch (err) {
    toast('❌ Failed to copy. See console.');
    console.error(err);
  }
}

// ══════════════════════════════════════════════
//  Fetch from GitHub preloads
// ══════════════════════════════════════════════
async function preloadFromGitHub() {
  if(GITHUB_FILES.length === 0) return;
  showProg(0, GITHUB_FILES.length);
  document.getElementById('progressLabel').textContent = "Downloading library from GitHub...";
  
  let loaded = 0;
  for (const filename of GITHUB_FILES) {
    try {
      const response = await fetch(filename);
      if (response.ok) {
        const blob = await response.blob();
        
        let type = blob.type;
        if (!type || type === "application/octet-stream") {
            if (filename.endsWith('.jpg') || filename.endsWith('.jpeg')) type = 'image/jpeg';
            if (filename.endsWith('.png')) type = 'image/png';
            if (filename.endsWith('.mp4')) type = 'video/mp4';
            if (filename.endsWith('.pdf')) type = 'application/pdf';
        }
        
        const fileObj = new File([blob], filename, { type: type });
        const id = 'f_' + Date.now() + '_' + Math.random().toString(36).slice(2);
        const rec = { id, name: filename, type: type, size: blob.size, blob: fileObj };
        
        allFiles.push(rec);
        await dbPut(rec);
      }
    } catch (err) {
      console.warn("Failed to load:", filename);
    }
    loaded++;
    showProg(loaded, GITHUB_FILES.length);
  }
  hideProg();
}

// ══════════════════════════════════════════════
//  Download 
// ══════════════════════════════════════════════
function dlOne(e, id){
  e.stopPropagation(); 
  const rec=allFiles.find(f=>f.id===id);
  if(!rec)return;
  
  const a = document.createElement('a');
  a.style.display = 'none';
  a.href = getURL(rec);
  a.download = rec.name; 
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

async function downloadAll(){
  if(!filtered.length)return toast('Nothing to download!');
  toast(`⬇ Starting download of ${filtered.length.toLocaleString()} files…`);
  for(let i=0;i<filtered.length;i++){
    const a=document.createElement('a');
    a.style.display = 'none';
    a.href=getURL(filtered[i]);
    a.download=filtered[i].name;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    if(i%5===4)await new Promise(r=>setTimeout(r,350));
  }
}

// ══════════════════════════════════════════════
//  Delete
// ══════════════════════════════════════════════
async function delOne(e, id){
  e.stopPropagation(); 
  if(objURLs[id]){URL.revokeObjectURL(objURLs[id]);delete objURLs[id];}
  allFiles=allFiles.filter(f=>f.id!==id);
  await dbDelete(id);
  if(selectedId === id) selectedId = null; 
  buildFiltered();
  relayout();
}
async function clearAll(){
  if(!confirm('Delete ALL files from vault? This cannot be undone.'))return;
  Object.values(objURLs).forEach(u=>URL.revokeObjectURL(u));
  objURLs={};allFiles=[];filtered=[];selectedId=null;
  await dbClear();
  relayout();
  toast('Vault cleared');
}

// ══════════════════════════════════════════════
//  Progress
// ══════════════════════════════════════════════
function showProg(done,total){
  document.getElementById('progressBar').className='show';
  document.getElementById('progressLabel').textContent=`Processing ${done.toLocaleString()} / ${total.toLocaleString()} files…`;
  document.getElementById('progressFill').style.width=(done/total*100)+'%';
}
function hideProg(){document.getElementById('progressBar').className='';}

// ══════════════════════════════════════════════
//  Toast
// ══════════════════════════════════════════════
let tt;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='show';
  clearTimeout(tt);tt=setTimeout(()=>t.className='',3000);
}

// ══════════════════════════════════════════════
//  Global Drag & Drop
// ══════════════════════════════════════════════
document.body.addEventListener('dragover',e=>e.preventDefault());
document.body.addEventListener('drop',e=>{
  e.preventDefault();
  if(e.dataTransfer.files.length) ingestFiles(e.dataTransfer.files);
});
document.getElementById('fileInput').addEventListener('change',e=>{ingestFiles(e.target.files);e.target.value='';});

// ══════════════════════════════════════════════
//  Util
// ══════════════════════════════════════════════
function yld(){return new Promise(r=>setTimeout(r,0));}

// ══════════════════════════════════════════════
//  Init
// ══════════════════════════════════════════════
async function init(){
  await openDB();
  const saved=await dbGetAll();
  
  if(saved.length === 0){
    await preloadFromGitHub();
  } else {
    showProg(0,saved.length);
    const CHUNK=100;
    for(let i=0;i<saved.length;i+=CHUNK){
      allFiles.push(...saved.slice(i,i+CHUNK));
      showProg(Math.min(i+CHUNK,saved.length),saved.length);
      await yld();
    }
    hideProg();
  }
  buildFiltered();
  relayout();
  PORT.focus(); 
}
init();
</script>
