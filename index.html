<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Vault</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --surface3: #22222f;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --accent: #7c6fff;
    --accent2: #a78bfa;
    --accent-glow: rgba(124,111,255,0.15);
    --text: #f0f0f8;
    --text2: #9090aa;
    --text3: #5a5a72;
    --green: #34d399;
    --red: #f87171;
    --gold: #fbbf24;
    --radius: 12px;
    --radius-sm: 8px;
    --radius-lg: 18px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── HEADER ─── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 64px;
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .logo {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 1.25rem;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .header-stats {
    display: flex;
    gap: 1.5rem;
    margin-left: auto;
    font-size: 0.8rem;
    color: var(--text2);
  }

  .stat-pill {
    display: flex;
    align-items: center;
    gap: 5px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 4px 12px;
  }

  .stat-pill span:first-child { color: var(--accent2); font-weight: 500; }

  /* ─── TOOLBAR ─── */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 1rem 2rem;
    flex-wrap: wrap;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
    max-width: 400px;
  }

  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    pointer-events: none;
  }

  input[type=search] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: inherit;
    font-size: 0.875rem;
    padding: 9px 12px 9px 38px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type=search]:focus { border-color: var(--accent); }

  select {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: inherit;
    font-size: 0.875rem;
    padding: 9px 12px;
    outline: none;
    cursor: pointer;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 16px;
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 0.875rem;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border2);
  }
  .btn-secondary:hover { background: var(--surface3); border-color: var(--border2); }

  .btn-danger {
    background: transparent;
    color: var(--red);
    border: 1px solid rgba(248,113,113,0.25);
  }
  .btn-danger:hover { background: rgba(248,113,113,0.1); }

  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.45; pointer-events: none; }

  /* ─── DROP ZONE ─── */
  #drop-zone {
    margin: 0 2rem 1.5rem;
    border: 2px dashed var(--border2);
    border-radius: var(--radius-lg);
    padding: 3rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface);
  }

  #drop-zone:hover, #drop-zone.over {
    border-color: var(--accent);
    background: var(--accent-glow);
  }

  #drop-zone .dz-icon {
    font-size: 2.5rem;
    margin-bottom: 0.75rem;
    opacity: 0.5;
  }

  #drop-zone h3 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.1rem;
    font-weight: 500;
    margin-bottom: 0.4rem;
  }

  #drop-zone p { color: var(--text2); font-size: 0.85rem; }

  #file-input { display: none; }

  /* ─── PROGRESS ─── */
  #progress-wrap {
    display: none;
    margin: 0 2rem 1.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem 1.5rem;
  }

  .progress-bar-track {
    height: 6px;
    background: var(--surface3);
    border-radius: 999px;
    overflow: hidden;
    margin: 0.75rem 0 0.5rem;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 999px;
    transition: width 0.1s;
    width: 0%;
  }

  #progress-text { font-size: 0.8rem; color: var(--text2); }

  /* ─── FILTERS BAR ─── */
  .filter-bar {
    display: flex;
    gap: 0.5rem;
    padding: 0 2rem 1rem;
    flex-wrap: wrap;
  }

  .filter-chip {
    padding: 5px 14px;
    border-radius: 999px;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text2);
    transition: all 0.15s;
  }

  .filter-chip:hover, .filter-chip.active {
    background: var(--accent-glow);
    border-color: var(--accent);
    color: var(--accent2);
  }

  /* ─── GRID ─── */
  #grid {
    padding: 0 2rem 4rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1rem;
  }

  /* ─── CARDS ─── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .card:hover {
    transform: translateY(-2px);
    border-color: var(--border2);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .card-preview {
    width: 100%;
    aspect-ratio: 4/3;
    background: var(--surface2);
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .card-preview img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .card-preview video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .file-icon {
    font-size: 2.5rem;
    opacity: 0.35;
    flex-direction: column;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .file-ext-badge {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    background: var(--surface3);
    border-radius: 4px;
    padding: 2px 6px;
    color: var(--text2);
    font-family: 'Space Grotesk', sans-serif;
  }

  .unmute-btn {
    position: absolute;
    bottom: 8px;
    right: 8px;
    background: rgba(0,0,0,0.7);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    color: #fff;
    cursor: pointer;
    padding: 4px 8px;
    font-size: 0.7rem;
    font-family: inherit;
    transition: background 0.15s;
    z-index: 2;
  }
  .unmute-btn:hover { background: rgba(255,255,255,0.2); }

  .card-info {
    padding: 0.75rem 0.875rem;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
  }

  .card-name {
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--text);
    word-break: break-all;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    line-height: 1.4;
  }

  .card-meta {
    font-size: 0.72rem;
    color: var(--text3);
  }

  .card-actions {
    display: flex;
    gap: 0.5rem;
    padding: 0 0.875rem 0.875rem;
  }

  .card-dl-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    padding: 7px 0;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text2);
    font-size: 0.78rem;
    font-family: inherit;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  .card-dl-btn:hover { background: var(--accent-glow); border-color: var(--accent); color: var(--accent2); }

  .card-del-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 7px 10px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text3);
    font-size: 0.78rem;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
  }
  .card-del-btn:hover { background: rgba(248,113,113,0.1); border-color: rgba(248,113,113,0.3); color: var(--red); }

  /* ─── EMPTY STATE ─── */
  #empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 5rem 2rem;
    color: var(--text3);
  }

  #empty-state .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
  #empty-state p { font-size: 0.9rem; }

  /* ─── LIGHTBOX ─── */
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 999;
    background: rgba(0,0,0,0.92);
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  #lightbox.open { display: flex; }

  #lightbox-inner {
    max-width: 90vw;
    max-height: 90vh;
    position: relative;
  }

  #lightbox-inner img,
  #lightbox-inner video {
    max-width: 90vw;
    max-height: 85vh;
    border-radius: var(--radius);
    display: block;
    object-fit: contain;
  }

  #lightbox-close {
    position: absolute;
    top: -2.5rem;
    right: 0;
    background: none;
    border: none;
    color: #fff;
    font-size: 1.5rem;
    cursor: pointer;
    opacity: 0.7;
    font-family: inherit;
  }
  #lightbox-close:hover { opacity: 1; }

  /* ─── TOAST ─── */
  #toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 10px 20px;
    font-size: 0.875rem;
    color: var(--text);
    transition: transform 0.3s;
    z-index: 10000;
    white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* ─── SCROLLBAR ─── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 999px; }

  @media (max-width: 600px) {
    header { padding: 0 1rem; }
    .toolbar, .filter-bar, #drop-zone, #grid, #progress-wrap { padding-left: 1rem; padding-right: 1rem; }
    #drop-zone { margin: 0 1rem 1.5rem; }
    #progress-wrap { margin: 0 1rem 1.5rem; }
    .header-stats { display: none; }
    #grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
  }
</style>
</head>
<body>

<header>
  <div class="logo">⬡ Vault</div>
  <div class="header-stats">
    <div class="stat-pill"><span id="stat-count">0</span><span>files</span></div>
    <div class="stat-pill"><span id="stat-size">0 MB</span><span>total</span></div>
  </div>
</header>

<div class="toolbar">
  <div class="search-wrap">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="search" id="search" placeholder="Search files…">
  </div>
  <select id="sort-select">
    <option value="newest">Newest first</option>
    <option value="oldest">Oldest first</option>
    <option value="name">Name A–Z</option>
    <option value="size-desc">Largest first</option>
    <option value="size-asc">Smallest first</option>
  </select>
  <button class="btn btn-primary" onclick="document.getElementById('file-input').click()">
    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    Upload Files
  </button>
  <button class="btn btn-secondary" id="dl-all-btn" onclick="downloadAll()" disabled>
    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Download All
  </button>
  <button class="btn btn-danger" id="clear-btn" onclick="confirmClear()" style="display:none;">
    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
    Clear All
  </button>
  <input type="file" id="file-input" multiple>
</div>

<div id="drop-zone">
  <div class="dz-icon">☁️</div>
  <h3>Drop files here to upload</h3>
  <p>Or click Upload Files — supports photos, videos, docs, and anything else · up to 2,500 files</p>
</div>

<div id="progress-wrap">
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <span style="font-size:0.875rem; font-weight:500;">Saving files…</span>
    <span id="progress-text">0 / 0</span>
  </div>
  <div class="progress-bar-track"><div class="progress-bar-fill" id="progress-fill"></div></div>
</div>

<div class="filter-bar">
  <button class="filter-chip active" data-type="all" onclick="setFilter(this,'all')">All</button>
  <button class="filter-chip" data-type="image" onclick="setFilter(this,'image')">🖼 Images</button>
  <button class="filter-chip" data-type="video" onclick="setFilter(this,'video')">🎬 Videos</button>
  <button class="filter-chip" data-type="audio" onclick="setFilter(this,'audio')">🎵 Audio</button>
  <button class="filter-chip" data-type="doc" onclick="setFilter(this,'doc')">📄 Docs</button>
  <button class="filter-chip" data-type="other" onclick="setFilter(this,'other')">📦 Other</button>
</div>

<div id="grid">
  <div id="empty-state">
    <div class="empty-icon">✨</div>
    <p>Your vault is empty — upload files to get started</p>
  </div>
</div>

<div id="lightbox">
  <div id="lightbox-inner">
    <button id="lightbox-close" onclick="closeLightbox()">✕</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ─── DB SETUP ───────────────────────────────────────────────────
const DB_NAME = 'VaultDB';
const STORE = 'files';
let db;
let allFiles = [];
let currentFilter = 'all';
let currentSort = 'newest';
let searchQ = '';

function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(STORE)) {
        const s = d.createObjectStore(STORE, { keyPath: 'id', autoIncrement: true });
        s.createIndex('name', 'name', { unique: false });
        s.createIndex('addedAt', 'addedAt', { unique: false });
      }
    };
    req.onsuccess = e => { db = e.target.result; res(db); };
    req.onerror = e => rej(e.target.error);
  });
}

function txStore(mode) {
  return db.transaction(STORE, mode).objectStore(STORE);
}

function dbGetAll() {
  return new Promise((res, rej) => {
    const req = txStore('readonly').getAll();
    req.onsuccess = e => res(e.target.result);
    req.onerror = e => rej(e.target.error);
  });
}

function dbAdd(record) {
  return new Promise((res, rej) => {
    const req = txStore('readwrite').add(record);
    req.onsuccess = e => res(e.target.result);
    req.onerror = e => rej(e.target.error);
  });
}

function dbDelete(id) {
  return new Promise((res, rej) => {
    const req = txStore('readwrite').delete(id);
    req.onsuccess = () => res();
    req.onerror = e => rej(e.target.error);
  });
}

function dbClear() {
  return new Promise((res, rej) => {
    const req = txStore('readwrite').clear();
    req.onsuccess = () => res();
    req.onerror = e => rej(e.target.error);
  });
}

// ─── FILE HELPERS ────────────────────────────────────────────────
function getFileType(mime, name) {
  if (!mime) mime = '';
  const ext = (name.split('.').pop() || '').toLowerCase();
  if (mime.startsWith('image/')) return 'image';
  if (mime.startsWith('video/')) return 'video';
  if (mime.startsWith('audio/')) return 'audio';
  const docExts = ['pdf','doc','docx','xls','xlsx','ppt','pptx','txt','csv','json','xml','html','css','js','ts','py','rb','go','java','cpp','c','h','md','rtf','odt','ods','odp'];
  if (docExts.includes(ext)) return 'doc';
  return 'other';
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  if (bytes < 1024*1024*1024) return (bytes/1024/1024).toFixed(1) + ' MB';
  return (bytes/1024/1024/1024).toFixed(2) + ' GB';
}

function fileToBase64(file) {
  return new Promise((res, rej) => {
    const fr = new FileReader();
    fr.onload = e => res(e.target.result);
    fr.onerror = rej;
    fr.readAsDataURL(file);
  });
}

// ─── UPLOAD ──────────────────────────────────────────────────────
document.getElementById('file-input').addEventListener('change', e => {
  handleFiles(Array.from(e.target.files));
  e.target.value = '';
});

const dz = document.getElementById('drop-zone');
dz.addEventListener('click', () => document.getElementById('file-input').click());
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('over'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('over');
  const items = Array.from(e.dataTransfer.files);
  if (items.length) handleFiles(items);
});

async function handleFiles(files) {
  if (!files.length) return;
  const MAX = 2500;
  const remaining = MAX - allFiles.length;
  if (remaining <= 0) { showToast('Vault is full (2,500 files max)'); return; }
  if (files.length > remaining) {
    files = files.slice(0, remaining);
    showToast(`Only ${remaining} more files fit — uploading first ${remaining}`);
  }

  const wrap = document.getElementById('progress-wrap');
  const fill = document.getElementById('progress-fill');
  const txt = document.getElementById('progress-text');
  wrap.style.display = 'block';

  const BATCH = 10;
  let done = 0;

  for (let i = 0; i < files.length; i += BATCH) {
    const batch = files.slice(i, i + BATCH);
    await Promise.all(batch.map(async f => {
      try {
        const data = await fileToBase64(f);
        const record = {
          name: f.name,
          size: f.size,
          mime: f.type,
          fileType: getFileType(f.type, f.name),
          data,
          addedAt: Date.now()
        };
        const id = await dbAdd(record);
        record.id = id;
        allFiles.push(record);
      } catch(e) { console.warn('skip', f.name, e); }
      done++;
      const pct = Math.round((done / files.length) * 100);
      fill.style.width = pct + '%';
      txt.textContent = `${done} / ${files.length}`;
    }));
    // yield to browser
    await new Promise(r => setTimeout(r, 0));
  }

  wrap.style.display = 'none';
  fill.style.width = '0%';
  renderGrid();
  updateStats();
  showToast(`Saved ${done} file${done !== 1 ? 's' : ''}`);
}

// ─── RENDER ──────────────────────────────────────────────────────
function getFiltered() {
  let list = [...allFiles];

  if (currentFilter !== 'all') {
    list = list.filter(f => f.fileType === currentFilter);
  }

  if (searchQ) {
    const q = searchQ.toLowerCase();
    list = list.filter(f => f.name.toLowerCase().includes(q));
  }

  list.sort((a, b) => {
    if (currentSort === 'newest') return b.addedAt - a.addedAt;
    if (currentSort === 'oldest') return a.addedAt - b.addedAt;
    if (currentSort === 'name') return a.name.localeCompare(b.name);
    if (currentSort === 'size-desc') return b.size - a.size;
    if (currentSort === 'size-asc') return a.size - b.size;
    return 0;
  });

  return list;
}

function renderGrid() {
  const grid = document.getElementById('grid');
  const list = getFiltered();

  const empty = document.getElementById('empty-state');
  const dlBtn = document.getElementById('dl-all-btn');
  const clrBtn = document.getElementById('clear-btn');

  if (!allFiles.length) {
    grid.innerHTML = '';
    grid.appendChild(empty);
    dlBtn.disabled = true;
    clrBtn.style.display = 'none';
    return;
  }

  dlBtn.disabled = false;
  clrBtn.style.display = '';

  if (!list.length) {
    grid.innerHTML = '<div id="empty-state"><div class="empty-icon">🔍</div><p>No files match your search</p></div>';
    return;
  }

  const frag = document.createDocumentFragment();
  list.forEach(f => {
    const card = buildCard(f);
    frag.appendChild(card);
  });
  grid.innerHTML = '';
  grid.appendChild(frag);

  // Start all videos
  grid.querySelectorAll('video').forEach(v => {
    v.muted = true;
    v.play().catch(() => {});
  });
}

function buildCard(f) {
  const card = document.createElement('div');
  card.className = 'card';

  // Preview
  const preview = document.createElement('div');
  preview.className = 'card-preview';

  if (f.fileType === 'image') {
    const img = document.createElement('img');
    img.loading = 'lazy';
    img.src = f.data;
    img.alt = f.name;
    img.style.cursor = 'pointer';
    img.onclick = () => openLightbox(f);
    preview.appendChild(img);
  } else if (f.fileType === 'video') {
    const vid = document.createElement('video');
    vid.src = f.data;
    vid.muted = true;
    vid.loop = true;
    vid.autoplay = true;
    vid.playsInline = true;
    vid.style.cursor = 'pointer';
    vid.onclick = () => openLightbox(f);
    preview.appendChild(vid);
    // Unmute button
    const umBtn = document.createElement('button');
    umBtn.className = 'unmute-btn';
    umBtn.textContent = '🔇 Unmute';
    umBtn.onclick = e => {
      e.stopPropagation();
      vid.muted = !vid.muted;
      umBtn.textContent = vid.muted ? '🔇 Unmute' : '🔊 Mute';
    };
    preview.appendChild(umBtn);
  } else if (f.fileType === 'audio') {
    const icon = document.createElement('div');
    icon.className = 'file-icon';
    icon.innerHTML = '<div style="font-size:2.2rem;">🎵</div><div class="file-ext-badge">' + getExt(f.name) + '</div>';
    preview.appendChild(icon);
    const aud = document.createElement('audio');
    aud.src = f.data;
    aud.controls = true;
    aud.style.cssText = 'position:absolute;bottom:8px;left:8px;right:8px;width:calc(100% - 16px);';
    preview.appendChild(aud);
  } else {
    const icon = document.createElement('div');
    icon.className = 'file-icon';
    icon.innerHTML = getFileEmoji(f) + '<div class="file-ext-badge">' + getExt(f.name) + '</div>';
    preview.appendChild(icon);
  }

  // Info
  const info = document.createElement('div');
  info.className = 'card-info';
  info.innerHTML = `<div class="card-name" title="${escHtml(f.name)}">${escHtml(f.name)}</div><div class="card-meta">${formatSize(f.size)}</div>`;

  // Actions
  const actions = document.createElement('div');
  actions.className = 'card-actions';

  const dlBtn = document.createElement('button');
  dlBtn.className = 'card-dl-btn';
  dlBtn.innerHTML = `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download`;
  dlBtn.onclick = () => downloadFile(f);

  const delBtn = document.createElement('button');
  delBtn.className = 'card-del-btn';
  delBtn.innerHTML = `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>`;
  delBtn.title = 'Delete file';
  delBtn.onclick = () => deleteFile(f.id, card);

  actions.appendChild(dlBtn);
  actions.appendChild(delBtn);

  card.appendChild(preview);
  card.appendChild(info);
  card.appendChild(actions);
  return card;
}

function getExt(name) {
  const parts = name.split('.');
  return parts.length > 1 ? parts.pop().toUpperCase().slice(0, 5) : 'FILE';
}

function getFileEmoji(f) {
  const ext = getExt(f.name).toLowerCase();
  const map = { pdf: '📕', doc: '📝', docx: '📝', xls: '📊', xlsx: '📊', ppt: '📊', pptx: '📊', txt: '📄', csv: '📊', json: '⚙️', xml: '⚙️', html: '🌐', css: '🎨', js: '⚡', ts: '⚡', py: '🐍', zip: '📦', rar: '📦', '7z': '📦', tar: '📦', gz: '📦' };
  return '<div style="font-size:2.2rem;">' + (map[ext] || '📁') + '</div>';
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── STATS ───────────────────────────────────────────────────────
function updateStats() {
  document.getElementById('stat-count').textContent = allFiles.length.toLocaleString();
  const total = allFiles.reduce((s, f) => s + f.size, 0);
  document.getElementById('stat-size').textContent = formatSize(total);
}

// ─── FILTER / SEARCH / SORT ──────────────────────────────────────
function setFilter(el, type) {
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  currentFilter = type;
  renderGrid();
}

document.getElementById('search').addEventListener('input', e => {
  searchQ = e.target.value.trim();
  renderGrid();
});

document.getElementById('sort-select').addEventListener('change', e => {
  currentSort = e.target.value;
  renderGrid();
});

// ─── DOWNLOAD ────────────────────────────────────────────────────
function downloadFile(f) {
  const a = document.createElement('a');
  a.href = f.data;
  a.download = f.name;
  a.click();
}

async function downloadAll() {
  const list = getFiltered();
  if (!list.length) return;

  if (list.length > 200) {
    showToast('Downloading ' + list.length + ' files one by one…');
    for (let i = 0; i < list.length; i++) {
      setTimeout(() => downloadFile(list[i]), i * 80);
    }
    return;
  }

  // Use JSZip for smaller sets
  showToast('Preparing ZIP…');
  const script = document.createElement('script');
  script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
  script.onload = async () => {
    const zip = new JSZip();
    const names = {};
    list.forEach(f => {
      let name = f.name;
      if (names[name]) { names[name]++; const p = name.lastIndexOf('.'); name = p > -1 ? name.slice(0,p) + '_' + names[f.name] + name.slice(p) : name + '_' + names[f.name]; } else { names[name] = 1; }
      const b64 = f.data.split(',')[1];
      zip.file(name, b64, { base64: true });
    });
    const blob = await zip.generateAsync({ type: 'blob', compression: 'STORE' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'vault-export.zip';
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 10000);
    showToast('ZIP downloaded!');
  };
  document.head.appendChild(script);
}

// ─── DELETE ──────────────────────────────────────────────────────
async function deleteFile(id, card) {
  await dbDelete(id);
  allFiles = allFiles.filter(f => f.id !== id);
  card.style.opacity = '0';
  card.style.transform = 'scale(0.9)';
  card.style.transition = 'all 0.2s';
  setTimeout(() => { card.remove(); updateStats(); if (!allFiles.length) renderGrid(); }, 200);
}

function confirmClear() {
  if (!confirm(`Delete all ${allFiles.length} files from your vault? This cannot be undone.`)) return;
  dbClear().then(() => {
    allFiles = [];
    renderGrid();
    updateStats();
    showToast('Vault cleared');
  });
}

// ─── LIGHTBOX ────────────────────────────────────────────────────
function openLightbox(f) {
  const lb = document.getElementById('lightbox');
  const inner = document.getElementById('lightbox-inner');
  // Remove previous media
  inner.querySelectorAll('img, video').forEach(el => el.remove());

  if (f.fileType === 'image') {
    const img = document.createElement('img');
    img.src = f.data;
    img.alt = f.name;
    inner.appendChild(img);
  } else if (f.fileType === 'video') {
    const vid = document.createElement('video');
    vid.src = f.data;
    vid.controls = true;
    vid.autoplay = true;
    vid.loop = true;
    inner.appendChild(vid);
  }

  lb.classList.add('open');
}

function closeLightbox() {
  const lb = document.getElementById('lightbox');
  lb.classList.remove('open');
  lb.querySelectorAll('video').forEach(v => v.pause());
}

document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === document.getElementById('lightbox')) closeLightbox();
});

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

// ─── TOAST ───────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ─── INIT ────────────────────────────────────────────────────────
(async () => {
  await openDB();
  allFiles = await dbGetAll();
  renderGrid();
  updateStats();
})();
</script>
